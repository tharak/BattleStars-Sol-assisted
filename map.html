<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<title>Successor Stars — Strategic Map</title>
<link rel="stylesheet" href="battle/styles.css">
<style>
  html,body{width:100%;min-height:100%;margin:0;overflow:hidden;background:var(--bg)}
  #mapApp{width:100vw;height:100dvh;display:grid;place-items:center;overflow:hidden}
  /* The strategic renderers use a square world.  Keeping the stage square
     prevents browsers from stretching its circles into ellipses on a
     rectangular viewport. */
  #mapArea{position:relative;width:min(100vw,100dvh);aspect-ratio:1;background:var(--panel)}
  #mapwrap,#mapwrap3d{position:absolute;inset:0;width:100%;height:100%;padding:0;border:0;border-radius:0;background:var(--panel);overflow:hidden}
  canvas{display:block;width:100%;height:100%;border-radius:0}
  /* Kept in the DOM for keyboard/Escape navigation, but the screen is map-first. */
  #topbar{display:none}
  #hint{position:absolute;z-index:6;bottom:10px;left:50%;transform:translateX(-50%);max-width:min(70%,420px);min-height:0;
    padding:5px 9px;border-radius:5px;background:#111624d9;color:var(--dim);font-size:12px;text-align:center;pointer-events:none}
  #turnPanel{position:absolute;top:12px;left:12px;width:220px;max-height:calc(100% - 24px);
    overflow:auto;background:#111624e8;border:1px solid var(--line);border-radius:8px;
    padding:10px 12px;font-size:12px;z-index:5}
  #turnHeading{font-weight:bold;font-size:14px}
  #turnClock{color:var(--gold);font-variant-numeric:tabular-nums;margin:2px 0 8px}
  .turnFaction{margin-top:8px}
  .turnFactionHeader{display:flex;justify-content:space-between;gap:6px;font-weight:bold;margin-bottom:3px}
  .turnFactionState{font-size:10px;text-transform:uppercase;color:var(--dim)}
  .turnFaction.active .turnFactionState{color:var(--gold)}
  .turnShips{display:grid;grid-template-columns:1fr 1fr;gap:3px}
  .turnShip{display:flex;justify-content:space-between;gap:4px;min-width:0;padding:3px 5px;
    font-size:11px;text-align:left}
  .turnShip span:first-child{overflow:hidden;text-overflow:ellipsis}
  .turnShipState{color:var(--dim);font-size:9px;text-transform:uppercase}
  .turnShip.ready{border-color:var(--gold)}
  .turnShip.acting{border-color:#fff;color:#fff}
  .turnShip.spent,.turnShip.destroyed{opacity:.55}
  #infoPanel{display:none;margin-top:10px;padding-top:10px;border-top:1px solid var(--line)}
  #infoControls{display:flex;flex-direction:column;gap:6px}
  #infoControls>button{width:100%}
  #infoShipButtons{display:flex;gap:4px;flex-wrap:wrap;margin:2px 0}
  #infoShipButtons button{flex:1 0 40%;padding:4px 6px;font-size:12px}
  #infoGroupMove[aria-pressed="true"]{border-color:var(--gold);color:var(--gold);background:#3b3422}
  @media(max-width:640px){
    #turnPanel{top:8px;left:8px;width:calc(50% - 14px);max-height:42%;padding:7px}
    .turnShips{grid-template-columns:1fr}
    #infoShipButtons button{padding:5px 4px;font-size:11px}
    #hint{bottom:4px;max-width:45%;font-size:10px}
  }
</style>
</head>
<body>
<div id="mapApp">
  <div id="topbar">
    <button id="zoomOut">◀ Zoom Out</button>
    <div id="breadcrumb"></div>
  </div>
  <div id="hint"></div>

  <div id="mapArea">
    <div id="mapwrap"><canvas id="starmapCv"></canvas></div>
    <div id="mapwrap3d" style="display:none"><canvas id="cv3d"></canvas></div>
    <aside id="turnPanel" aria-label="Strategic turn roster">
      <div id="turnHeading"></div>
      <div id="turnClock" role="timer"></div>
      <div id="turnFactions"></div>
      <div id="infoPanel" aria-label="Fleet controls">
          <div id="infoControls">
          <div id="infoShipButtons">
            <button id="infoTurnL">◄ Turn</button>
            <button id="infoTurnR">► Turn</button>
            <button id="infoForward">▲ Forward</button>
            <button id="infoBack" title="1 hex astern, keeps facing — costs all remaining MP">▼ Back</button>
            <button id="infoFire" class="danger">Fire</button>
            <button id="infoTravel">Set Course</button>
            <button id="infoGroupMove" style="display:none">Move command group</button>
          </div>
          <button id="infoEnd" class="primary">End activation</button>
        </div>
      </div>
    </aside>
  </div>
</div>

<script type="module" src="map/main.js"></script>
</body>
</html>
