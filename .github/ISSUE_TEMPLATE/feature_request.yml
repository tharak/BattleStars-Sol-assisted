name: Feature request
description: Propose a gameplay or development improvement
labels: [enhancement]
body:
  - type: checkboxes
    attributes:
      label: Before submitting
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the player or developer need before proposing implementation details.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Strategic gameplay
        - Tactical battle rules
        - Rendering and visual effects
        - Controls and accessibility
        - Simulation and balance
        - Architecture, tests, or tooling
